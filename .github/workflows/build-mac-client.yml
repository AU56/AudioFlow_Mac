name: Build AudioFlow macOS Client

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install audio tools
        run: |
          brew install ffmpeg sox

      - name: Build app
        run: |
          BUILD_DIR="$GITHUB_WORKSPACE/内部文件_不要改"
          if [ ! -f "$BUILD_DIR/build_mac_app.sh" ]; then
            echo "build_mac_app.sh not found in $BUILD_DIR"
            exit 1
          fi
          cd "$BUILD_DIR"
          chmod +x build_mac_app.sh
          ./build_mac_app.sh
          cp AudioFlow_Studio_Mac.zip "$GITHUB_WORKSPACE/AudioFlow_Studio_Mac.zip"

      - name: Upload customer package
        uses: actions/upload-artifact@v4
        with:
          name: AudioFlow_Studio_Mac
          path: AudioFlow_Studio_Mac.zip
